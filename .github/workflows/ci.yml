# Welcome to the Dark Factory CI pipeline!

## Workflow

This workflow will perform the following tasks:
- Lint the code
- Build the project
- Test the project

```yml
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Lint code
        run: yarn lint
      - name: Build project
        run: yarn build
      - name: Test project
        run: yarn test
    strategy:
      fail-fast: true

```